<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form요소</title>
  </head>
  <body>
    <!-- 
    form : 웹브라우저에서 유일하게 사용자의 데이터를 입력받을 수 있는 요소  
    action : 사용자의 입력정보를 저장한 서버컴퓨터의 주소를 작성하는 
    method : 전송하는 방식 / get->외부 노출형 post->비공개형-->

    <form action="#" method="post">
      <fieldset>
        <legend>로그인입력창</legend>
        <p>ID : <input type="text" /></p>
        <p>PW : <input type="password" /></p>
      </fieldset>
    </form>
    <hr>
    <h2>관련 문서들</h2>
    <ul>
      <li><a href="./ex1-25.html">다양한 input</a></li>
      <li><a href="./ex1-26.html">과제-레시피재료</a></li>
    </ul>


  </body>
</html>
