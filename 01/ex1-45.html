<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <!-- mdn레퍼런스에서 예시를 붙여넣기 한 것 -->
  <body>
    <button command="show-modal" commandfor="my-dialog">Open dialog</button>

    <dialog id="my-dialog">
      <p>This dialog was opened using an invoker command.</p>
      <button commandfor="my-dialog" command="close">Close</button>
    </dialog>
<br>
<h2>다이얼로그 예시</h2>
<!-- 내가 직접 시연한 것 -->
    <dialog id="pop" closedby="any">
      <p>안녕하세요~</p>
      <button commandfor="pop" command="close">OK</button>
    </dialog>
    <button commandfor="pop" command="show-modal">열어</button>
  </body>
</html>
