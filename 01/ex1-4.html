<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>heading</title>
  </head>
  <body>
    <!-- headin : 웹페이지의 제목을 표시 -->
    <!-- 제목의 중요도에 따라 작은 숫자로 표시-->
    <!-- h1은 페이지에서 단 한개만 사용 -->
    <!-- h$*6은 h와 함께 1-6까지를 생성하는 단축어 -->
    <h1>title</h1>
    <h2>title</h2>
    <h3>title</h3>
    <h4>title</h4>
    <h5>title</h5>
    <h6>title</h6>
  </body>
</html>
