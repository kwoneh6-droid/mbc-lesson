<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지태그</title>
</head>
<body>
    <img src="img/img3.png" alt="코카콜라 캔">
    <img src="img/mymelody.gif" alt="산리오의 핑크색귀를 가진 토끼캐릭터인 마이멜로디가 깡총깡총 뛰면서 행복해 하는 움직이는 사진"width=800>
    <img src="img/mymelody" alt="산리오의 핑크색귀를 가진 토끼캐릭터인 마이멜로디가 깡총깡총 뛰면서 행복해 하는 움직이는 사진"width=800>
    <!-- alt속성의 3가지 용법
        1. 접근성 향상 : 이미지를 읽어줌  
        2. 대체텍스트 기능을 가짐 : 이미지가 모종의 이유로 깨져서 나오지 않으면 alt에 있는 텍스트가 보여짐
        3. SEO (search engine optimization) : 검색엔진에게 이미지의 정보를 알려줌-->
        <!-- 태그가 웹페이지에서 표시될때 두개로 분류된다
         1. 블록레벨 : 아래로 내려가면서 표시되는것(줄바꿈 되는것)
         2. 인라인레벨  : 옆으로 쭉이어지며 표시-->
    </body>
</html>
