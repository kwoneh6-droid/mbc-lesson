<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QUIZ4-사과홈페이지</title>
    <link rel="stylesheet" href="./css/quiz4.css" />
  </head>
  <body>
    <div class="wrap">
      <img src="./img/apple.jpg" alt="사과이미지" />
      <div class="info_wrap">
        <h2>확인하세요</h2>
        <div class="box">
          <h3>주문 및 배송</h3>
          <p><span class="blue">오후 2시 이전</span> 주문건은 당일 발송합니다</p>
          <p>2시 이후 주문건은 다음날 발송합니다(주말 제외)</p>
        </div>
       
        <div class="box">
          <h3>교환 및 환불</h3>
          <p>불만족시 <span class="blue">100% 환불</span>해 드립니다</p>
          <p>고객센터로 전화주세요</p>
        </div>
        <div class="box">
          <h3>고객센터</h3>
          <p>0000-0000</p>
          <p class="time">상담시간 : 오전 9시 ~ 오후 6시 (토/일, 공휴일 휴무)</p>
        </div>
      </div>
    </div>
  </body>
</html>
