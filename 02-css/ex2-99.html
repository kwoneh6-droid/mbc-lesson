<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>beat애니메이션</title>
    <style>
      .heart {
        font-size: 100px;
        color: pink;
        text-align: center;
        /*  */
        animation-name: beat;
        animation-duration: 3s;
        animation-iteration-count: infinite;
        animation-fill-mode: forwards;
        animation-direction: alternate;
        animation-timing-function: cubic-bezier(0.09, 0.52, 0.48, 1.17);
        animation-play-state: paused;
        /* 글자일시에 드래그해도 드래그가 안되게 할 방법 */
        user-select: none;
      }
      .heart:hover {
        animation-play-state: running;
      }
      @keyframes beat {
        0% {
          transform: scale(0.5);
        }
        50% {
          transform: scale(1.1);
        }
        52.5% {
          transform: scale(0.9);
        }
        55% {
          transform: scale(1);
        }
        100% {
          transform: scale(1.3);
        }
      }
    </style>
  </head>
  <body>
    <div class="heart">❤</div>
  </body>
</html>
