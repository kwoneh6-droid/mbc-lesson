<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MASK</title>

    <style>
      .fade {
        height: 300px;
        background: url("img/lotus.png") no-repeat center / cover;
        /* vendor prefix : 제조사 접두어->아직 w3c에서 공식으로 제정하기 전에 새로운 기술들을 개발하고 접두어를 붙이는 것 그러므로 아직은 표준화가 되었는지 알수 없는 것들 */
        /* 알려면 caniuse에 들어가서 검색해보는게 좋음, AI도 아직 잘 모를수 있음 */
        /* 이런 vendor prefix는 반드시 호환이 안되는 곳에서도 작동할 수있도록 대체제를 같이 적어야함 안적으면 문법오류남 */
        -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent);
        mask-image: linear-gradient(to bottom, black 60%, transparent);
        /* -webkit-: 크롬, 엣지, 사파리, 오페라
            -o- : 구 오페라
            -moz- : 파이어폭스
            
            */
      }
    </style>
  </head>
  <body>
    <div class="fade"></div>
  </body>
</html>
