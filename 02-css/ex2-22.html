<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webfont</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Dongle&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=wb_sunny" />
    <style>
      @font-face {
        font-family: "JejuStoneWall";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2210-EF@1.0/EF_jejudoldam.woff2") format("woff2");
        font-weight: normal;
        font-display: swap;
      }
    </style>
    <style>
      .t1 {
        font-family: "Dongle", sans-serif;
        font-weight: 400;
        font-style: normal;
      }
      .t2 {
        font-family: "JejuStoneWall";
      }
      .icon {
        color: red;
      }
      .icon:hover{color: yellow;}
    </style>
  </head>
  <body>
    <div class="t1"><span class="material-symbols-rounded icon"> wb_sunny </span>오늘의 날씨를 말씀드리겠습니다.</div>
    <div class="t2"><span class="material-symbols-rounded icon"> wb_sunny </span>오늘의 날씨를 말씀드리겠습니다.</div>
  </body>
</html>
