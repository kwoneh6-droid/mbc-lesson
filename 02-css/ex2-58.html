<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>box-sizing</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background: url("./img/bg_grid.png");
      }
      p {
        background-color: rgba(255, 255, 0, 0.6);
        border: 10px solid rgba(0, 0, 0, 0.5);
        width: 600px;
        height: 100px;
        margin-bottom: 10px;
      }
      .sizing {
        box-sizing: border-box;
        /* 박스 크기계산할때 어디를 기준으로 계산할건지 기준을 지정해주는 속성->테두리까지 합쳐서 내가 제시한 속성에 맞추라는 뜻 */
      }

      .sizing_list {
        width: 500px;
        /* margin-top: 20px; */
        margin: 20px auto;
        padding: 50px;
        height: 200px;
        box-sizing: content-box;
        /* box-sizing: border-box; */
        list-style: none;
      }
      .sizing_list li {
        background: rgba(219, 95, 95, 0.8);
        text-align: center;
        display: inline-block;
        width: 24%;
        height: 100%;
        line-height: 200px;
      }
      .sizing_list li:nth-child(odd) {
        background: rgba(219, 195, 95, 0.5);
      }
      a {
        text-decoration: none;
        color: white;
        font-size: 1.5rem;
      }
    </style>
  </head>
  <body>
    <p>It's impossible not only starting good but also keeping it firm!!</p>
    <p class="sizing">It's impossible not only starting good but also keeping it firm!!</p>
    <ul class="sizing_list">
      <li><a href="#">Company</a></li>
      <li><a href="#">Service</a></li>
      <li><a href="#">Custommer</a></li>
      <li><a href="#">Community</a></li>
    </ul>
  </body>
</html>
