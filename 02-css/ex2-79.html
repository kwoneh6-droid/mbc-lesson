<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>grid 기본 레이아웃</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      header,
      nav,
      main,
      footer {
        padding: 20px;
      }
      header {
        background: #f99;
      }
      nav {
        background: #9f9;
      }
      main {
        background: #99f;
      }
      footer {
        background: #ff9;
      }

      .grid-layout {
        display: grid;
        grid-template-areas:
          "header header header"
          "nav main main"
          "footer footer footer";
      }
      header {
        grid-area: header;
      }
      nav {
        grid-area: nav;
      }
      main {
        grid-area: main;
      }
      footer {
        grid-area: footer;
      }
    </style>
  </head>
  <body>
    <div class="grid-layout">
      <!-- 상위요소가 그리드 컨테이너/하위요소가 그리드 아이템박스 -->
      <header>Header</header>
      <nav>Nav</nav>
      <main>Main</main>
      <footer>Footer</footer>
    </div>




    
  </body>
</html>
