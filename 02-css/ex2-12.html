<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* ~표시를 틸트라고 하며 전에 오는 요소부터~다음에 오는 요소를 선택해서 거기에 효과를 적용하겠다는 뜻 */
      .title ~ p {
        background-color: skyblue;
      }
      .title~p+p{color: white; background-color: red;}
    
    </style>
  </head>
  <body>
    <p class="title">엑스포 안내</p>
    <p>책자를 배부하고 있습니다.</p>
    <p>8월의 여행지</p>
    <p>9월의 여행지</p>
    <ul>
      <p>
        <li>주중에는 정오 이벤트가 있습니다</li>
      </p>
      <p>
        <li>주말에는 자정 이벤트가 있습니다</li>
      </p>
    </ul>
    <p>9월에는 가을 이벤트가 시작됩니다</p>
    
  </body>
</html>
