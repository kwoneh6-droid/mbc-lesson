<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>의사 클래스(pseudo)</title>
    <!-- 의사 클래스(pseudo class) : 상태, 위치를 선택  -->
    <style>
      li {
        background-color: gray;
        margin-bottom: 20px;
      }
      a {
        text-decoration: none;
        color: black;
      }
      a:hover {
        color: yellow;
        
      }
    </style>
    <style>
      /* nth-child */
      li:nth-child(3) {
        background-color: beige;
      }
      li:last-child,
      li:last-child a {
        color: red;
      }
      li {
        list-style: none;
      }
    </style>
    <!-- 의사 요소(pseudo Elements) : 없는거 추가, 선택-->
    <style>
      li::first-letter {
        font-size: 32px;
      }
    
      li:hover:before {
        content: "💟";
      }
      li:hover:after {
        content: "💌";
      }
    </style>
  </head>
  <body>
    <ul>
      <li><a href="#">COMPANY</a></li>
      <li><a href="#">PRODUCT</a></li>
      <li><a href="#">SERVICE</a></li>
      <li><a href="#">COMMUNITY</a></li>
    </ul>
  </body>
</html>
