<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Mostly Fluid</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      #wrap {
        display: flex;
        gap: 20px;
        width: 100%;
        /* 너비를 100%는 부모요소의 영역을 다쓰겠다는 말 */
        max-width: 960px;
        background-color: gray;
        margin: 0 auto;
        /* 마진으로 중앙정렬을 하려면 너비가 정해져 있어야함 
    빈공간이 있어야 마진도 생기는데 전체를 다쓰면 마진이 없으니 중앙정렬할 값도 없음 0*2=0임 */
      }
      @media screen and (max-width: 960px) {
        #wrap {
          width: 100%;
        }
      }
      #content {
        background-color: aqua;
        /* flex-item 박스의 가변 크기지정 */
        flex-grow: 1;
        flex-shrink: 1;
        flex-basis: 600px;
        /* 단축속성 */
        flex: 1 1 62.5%;
      }
      #aside {
        background-color: antiquewhite;
        /* width: 100px; */

        flex-grow: 1;
        flex-shrink: 1;
        flex-basis: 400px;
        flex: 1 1 35%;
      }
      @media screen and (max-width: 600px) {
        #wrap {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="content">Content</div>
      <div id="aside">Aside</div>
    </div>
  </body>
</html>
