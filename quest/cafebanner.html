<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EH'S Cafe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Decoration Boxes -->
        <div class="decoration">
            <div class="box bottom-box"></div>
            <div class="box right-box"></div>
            <div class="box left-box"></div>
            <div class="box top-box"></div>
        </div>

        <!-- Main Text -->
        <div class="main-title">
            <p>EH’S</p>
        </div>

        <!-- Info Texts -->
        <div class="info info-left">
            <p>8AM-2PM</p>
        </div>
        <div class="info info-right">
            <p>OPEN EVERY DAY</p>
        </div>
        <div class="info info-bottom">
            <p>468 DUKE STREET</p>
        </div>
    </div>
</body>
</html>
