<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        .galleryWrap *{
            user-select: none;
        }
    </style>
  </head>
  <body>
    <div class="galleryWrap">
      <h1>이미지 넘기기</h1>
      <a href="#" onclick="prev()">◀</a>
      <img src="/03-js/03-1/img1.jpg" alt="" width="300" height="200" id="pic" />
      <a href="#" onclick="next()">▶</a>
    </div>
    <script>
      let num = 1;
      function prev() {
        // console.log("click");
        // document.body.style.background = "gray";
        // document.querySelector("h1").style.color = "red";

        num--;
        if (num < 1) {
          num = 10;
        }
        let a = document.querySelector("#pic");
        console.log(a.src);
        a.src = `/03-js/03-1/img${num}.jpg`;
        // 템플릿 리터러리 라는 ${}는 변수는 {안에 적으면 됨}
      }

      function next() {
        // console.log("click");
        // document.body.style.background = "gray";
        // document.querySelector("h1").style.color = "red";

        num++;
        if (num > 10) {
          num = 1;
        }
        let a = document.querySelector("#pic");
        console.log(a.src);
        a.src = `/03-js/03-1/img${num}.jpg`;
        // 템플릿 리터러리 라는 ${}는 변수는 {안에 적으면 됨}
      }
    </script>
  </body>
</html>
